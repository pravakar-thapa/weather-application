<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Weather App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
                <form class="d-flex" role="search">
                    <input type="text" id="city" placeholder="Enter your city" class="form-control me-2" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit" id="submit">Search</button>
                </form>
            </div> 
        </div>
    </nav>

    <div class="container">
        <main>
            <h1 class="my-4 text-center">Weather for <span id="cityName"></span></h1>
            <div class="row row-cols-1 row-cols-md-3 mb-3 text-center ">

                <div class="col">
                    <div class="card mb-4 rounded-3 shadow-sm">
                        <div class="card-header py-3">
                            <h4 class="my-0 fw-normal">Temperatures</h4>
                        </div>

                        <div class="card-body">
                            <h1 class="card-title pricing-card-title"><span id="temp"></span>
                                <small class="text-body-secondary fw-light">°C</small>
                            </h1>

                            <ul class="list-unstyled mt-3 mb-4">
                                <!--<li>Temperature is <span id="temp"></span>°C</li>-->
                                <li>weathercode is <span id="weathercode"></span></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card mb-4 rounded-3 shadow-sm">
                        <div class="card-header py-3">
                            <h4 class="my-0 fw-normal">Wind Info</h4>
                        </div>

                        <div class="card-body">
                            <h1 class="card-title pricing-card-title"><span id="wind_speed"></span>
                                
                                <small class="text-body-secondary fw-light"> km/hr</small>
                            </h1>

                            <ul class="list-unstyled mt-3 mb-4">
                                <!--<li>windspeed is <span id="wind_speed"></span></li>-->
                                <li>winddirection is <span id="wind_degrees"></span></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="col">
                    <div class="card mb-4 rounded-3">
                        <div class="card-header py-3">
                            <h4 class="my-0 fw-normal">City Info</h4>
                        </div>

                        <div class="card-body">
                            <h1 class="card-title pricing-card-title"><span id="time"></span>
                            </h1>
 
                            <ul class="list-unstyled mt-3 mb-4">
                               <li>Is day (1 = day, 0 = night) <span id="is_day"></span></li> 
                            </ul>
                        </div>
                    </div>
                </div>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="script.js"></script>

</body>

</html>
